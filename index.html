html <script>  const CATEGORY_LIST = [ "소설","시/에세이","경제경영","자기계발","인문","사회","역사","과학","예술","IT","기타" ];  const input = document.getElementById("searchInput"); const results = document.getElementById("results"); const editToggle = document.getElementById("editToggle");  let debounce; let editMode = false; let sortableInstance;  input.addEventListener("input", () => {  clearTimeout(debounce);  const query = input.value.trim();  if(query.length < 1){ results.style.display = "none"; return; }  debounce = setTimeout(() => { searchBooks(query); }, 250);  });  editToggle.addEventListener("click", () => {  editMode = !editMode;  editToggle.innerText = editMode ? "완료" : "편집";  if(editMode){ enableDrag(); }else{ disableDrag(); }  });  async function searchBooks(query){  try{  const response = await fetch( `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&maxResults=8` );  const data = await response.json();  renderResults(data.items || []);  }catch(e){ console.log(e); }  }  function renderResults(items){  results.innerHTML = "";  if(items.length === 0){ results.style.display = "none"; return; }  items.forEach(item => {  const book = item.volumeInfo;  const div = document.createElement("div");  div.className = "result-item";  div.innerHTML = ` <img src="${book.imageLinks?.thumbnail || ''}">  <div> <div style="font-size:14px;font-weight:700;"> ${book.title || "제목 없음"} </div>  <div style="font-size:12px;color:#777;margin-top:4px;"> ${book.authors ? book.authors.join(", ") : "저자 정보 없음"} </div> </div> `;  div.onclick = () => addBook(book);  results.appendChild(div);  });  results.style.display = "block";  }  function autoCategory(book){  const text = ( (book.categories || []).join(" ") + " " + (book.description || "") + " " + (book.title || "") ).toLowerCase();  if( text.includes("경제") || text.includes("투자") || text.includes("finance") || text.includes("business") || text.includes("경영") || text.includes("돈") ){ return "경제경영"; }  if( text.includes("자기계발") || text.includes("습관") || text.includes("동기부여") || text.includes("성공") || text.includes("마인드") || text.includes("self") ){ return "자기계발"; }  if( text.includes("소설") || text.includes("novel") || text.includes("fiction") ){ return "소설"; }  if( text.includes("역사") || text.includes("history") ){ return "역사"; }  if( text.includes("과학") || text.includes("science") ){ return "과학"; }  if( text.includes("컴퓨터") || text.includes("개발") || text.includes("프로그래밍") || text.includes("computer") || text.includes("javascript") || text.includes("python") || text.includes("코딩") ){ return "IT"; }  if( text.includes("철학") || text.includes("심리") || text.includes("인문") ){ return "인문"; }  if( text.includes("에세이") || text.includes("시") ){ return "시/에세이"; }  return "기타";  }  function addBook(book){  const item = { id:Date.now(), title:book.title || "제목 없음", authors:book.authors ? book.authors.join(", ") : "저자 정보 없음", thumbnail:book.imageLinks?.thumbnail || "", infoLink:book.infoLink || "#", category:autoCategory(book) };  const books = getBooks();  books.unshift(item);  localStorage.setItem("wishBooks", JSON.stringify(books));  renderBooks();  input.value = "";  results.style.display = "none";  }  function renderBooks(){  const grid = document.getElementById("bookGrid");  const empty = document.getElementById("emptyText");  const books = getBooks();  grid.innerHTML = "";  if(books.length === 0){ empty.style.display = "block"; return; }  empty.style.display = "none";  books.forEach(book => {  const card = document.createElement("div");  card.className = "book";  card.dataset.id = book.id;  card.innerHTML = `  <a href="${book.infoLink}" target="_blank" rel="noopener noreferrer" > <img src="${book.thumbnail}"> </a>  <div class="book-content">  <div class="book-title"> ${book.title} </div>  <div class="book-author"> ${book.authors} </div>  <div class="category">  <select onchange="changeCategory(${book.id}, this.value)">  ${CATEGORY_LIST.map(cat => ` <option value="${cat}" ${book.category === cat ? "selected" : ""}> ${cat} </option> `).join("")}  </select>  </div>  <div class="book-actions">  <button onclick="editBook(${book.id})"> 수정 </button>  <button onclick="deleteBook(${book.id})"> 삭제 </button>  </div>  </div> `;  grid.appendChild(card);  });  }  function enableDrag(){  const grid = document.getElementById("bookGrid");  sortableInstance = new Sortable(grid, {  animation:150,  onEnd: () => {  const ids = [...grid.children].map( item => Number(item.dataset.id) );  const books = getBooks();  const sorted = ids.map( id => books.find(book => book.id === id) );  localStorage.setItem( "wishBooks", JSON.stringify(sorted) );  }  });  }  function disableDrag(){  if(sortableInstance){ sortableInstance.destroy(); }  }  function changeCategory(id, value){  const books = getBooks();  const target = books.find(book => book.id === id);  target.category = value;  localStorage.setItem("wishBooks", JSON.stringify(books));  }  function deleteBook(id){  let books = getBooks();  books = books.filter(book => book.id !== id);  localStorage.setItem("wishBooks", JSON.stringify(books));  renderBooks();  }  function editBook(id){  const books = getBooks();  const target = books.find(book => book.id === id);  const title = prompt("책 제목 수정", target.title);  if(title === null) return;  target.title = title;  localStorage.setItem("wishBooks", JSON.stringify(books));  renderBooks();  }  function getBooks(){  return JSON.parse( localStorage.getItem("wishBooks") || "[]" );  }  document.addEventListener("click", (e) => {  if(!e.target.closest(".search-box")){ results.style.display = "none"; }  });  renderBooks();  </script>
